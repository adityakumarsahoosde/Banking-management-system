<!DOCTYPE html>
<html>
<head>
    <title>Transactions</title>
</head>
<body>

<h2>Transaction History</h2>

<table border="1">
    <tr>
        <th>Type</th>
        <th>Amount</th>
        <th>Date</th>
    </tr>

    {% for transaction in transactions %}
    <tr>
        <td>{{ transaction.transaction_type }}</td>
        <td>{{ transaction.amount }}</td>
        <td>{{ transaction.timestamp }}</td>
    </tr>
    {% endfor %}

</table>

</body>
</html>
